<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | DevStoreEmail</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-header {
            background: rgba(30,30,35,0.6);
            backdrop-filter: blur(20px);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .balance-card {
            background: linear-gradient(135deg, #E53935, #C62828);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }
        .balance-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .balance-card .amount {
            font-size: 48px;
            font-weight: 700;
        }
        .balance-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-success { background: #4CAF50; color: white; }
        .status-pending { background: #FF9800; color: black; }
        .status-failed { background: #E53935; color: white; }
        .transaction-item {
            background: rgba(30,30,35,0.4);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="blur-overlay"></div>

    <div class="dashboard-header">
        <div class="logo" style="display:flex; align-items:center; gap:8px;">
            <span>📧</span>
            <strong>DevStoreEmail</strong>
        </div>
        <div>
            <span id="userName"></span>
            <button onclick="logout()" style="background:none; border:none; color:#E53935; margin-left:16px;">Logout</button>
        </div>
    </div>

    <div class="container" style="max-width:800px; margin:40px auto; padding:0 20px;">
        <!-- Balance Card -->
        <div class="balance-card">
            <h3>💰 Total Saldo</h3>
            <div class="amount" id="balanceAmount">Rp 0</div>
            <div class="balance-actions">
                <button class="btn-outline" onclick="showTopUp()">➕ Top Up</button>
                <button class="btn-outline" onclick="showWithdraw()">💸 Tarik Saldo</button>
            </div>
        </div>

        <!-- Buy Email Section -->
        <div style="background: rgba(30,30,35,0.4); border-radius: 32px; padding: 24px; margin-bottom: 32px;">
            <h3>🛒 Beli Email Domain .com</h3>
            <div style="display: grid; gap: 16px; margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 20px;">
                    <div>
                        <strong>Gmail .com</strong><br>
                        <small style="color:#8E8E93;">Username@Gmail.com</small>
                    </div>
                    <div>Rp 25.000</div>
                    <button class="btn-primary" style="padding:8px 20px;" onclick="buyEmail('Gmail .com', 25000)">Beli</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 20px;">
                    <div>
                        <strong>Outlook .com</strong><br>
                        <small style="color:#8E8E93;">Username@Outlook.com</small>
                    </div>
                    <div>Rp 15.000</div>
                    <button class="btn-primary" style="padding:8px 20px;" onclick="buyEmail('Outlook .com', 15000)">Beli</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 20px;">
                    <div>
                        <strong>Yahoo .com</strong><br>
                        <small style="color:#8E8E93;">Username@Yahoo.com</small>
                    </div>
                    <div>Rp 20.000</div>
                    <button class="btn-primary" style="padding:8px 20px;" onclick="buyEmail('Yahoo .com', 20000)">Beli</button>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div style="background: rgba(30,30,35,0.4); border-radius: 32px; padding: 24px;">
            <h3>📜 Riwayat Transaksi</h3>
            <div id="transactionList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        let currentUser = null;

        function loadUser() {
            const userStr = localStorage.getItem('devstore_current_user');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').innerText = currentUser.username;
            updateBalanceDisplay();
            renderTransactions();
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceAmount').innerText = `Rp ${currentUser.balance.toLocaleString()}`;
            // Update di localStorage users
            let users = JSON.parse(localStorage.getItem('devstore_users') || '[]');
            const index = users.findIndex(u => u.id === currentUser.id);
            if (index !== -1) {
                users[index].balance = currentUser.balance;
                localStorage.setItem('devstore_users', JSON.stringify(users));
                localStorage.setItem('devstore_current_user', JSON.stringify(currentUser));
            }
        }

        function buyEmail(emailName, price) {
            if (currentUser.balance < price) {
                alert('❌ Saldo tidak mencukupi! Silakan top up terlebih dahulu.');
                return;
            }

            // Kurangi saldo
            currentUser.balance -= price;
            
            // Buat transaksi dengan status PENDING dulu
            const transaction = {
                id: Date.now(),
                type: 'BELI EMAIL',
                product: emailName,
                amount: price,
                status: 'pending',
                date: new Date().toISOString()
            };
            
            let transactions = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
            transactions.unshift(transaction);
            localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
            
            updateBalanceDisplay();
            renderTransactions();
            
            // Simulasi verifikasi (setelah 2 detik jadi sukses)
            setTimeout(() => {
                let updatedTransactions = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
                const found = updatedTransactions.find(t => t.id === transaction.id);
                if (found) {
                    found.status = 'success';
                    localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(updatedTransactions));
                    renderTransactions();
                    alert(`✅ Pembelian ${emailName} berhasil! Cek email Anda.`);
                }
            }, 2000);
            
            alert(`⏳ Pesanan ${emailName} diproses. Status: PENDING. Mohon tunggu 2 detik.`);
        }

        function renderTransactions() {
            const container = document.getElementById('transactionList');
            let transactions = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
            
            if (transactions.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#8E8E93;">Belum ada transaksi</p>';
                return;
            }
            
            container.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div>
                        <strong>${t.type}</strong><br>
                        <small style="color:#8E8E93;">${t.product || 'Top up / Withdraw'}</small><br>
                        <small>${new Date(t.date).toLocaleString()}</small>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:bold;">Rp ${t.amount.toLocaleString()}</div>
                        <div><span class="status-badge status-${t.status}">${t.status.toUpperCase()}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function showTopUp() {
            let nominal = prompt('Masukkan nominal top up (min Rp 10.000):', '50000');
            if (nominal) {
                let amount = parseInt(nominal);
                if (amount < 10000) {
                    alert('Minimal top up Rp 10.000');
                    return;
                }
                currentUser.balance += amount;
                let transactions = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
                transactions.unshift({
                    id: Date.now(),
                    type: 'TOP UP',
                    amount: amount,
                    status: 'success',
                    date: new Date().toISOString()
                });
                localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
                updateBalanceDisplay();
                renderTransactions();
                alert(`✅ Top up Rp ${amount.toLocaleString()} berhasil!`);
            }
        }

        function showWithdraw() {
            let nominal = prompt('Masukkan nominal tarik saldo (min Rp 25.000):', '50000');
            if (nominal) {
                let amount = parseInt(nominal);
                if (amount < 25000) {
                    alert('Minimal tarik saldo Rp 25.000');
                    return;
                }
                if (amount > currentUser.balance) {
                    alert('Saldo tidak mencukupi!');
                    return;
                }
                
                currentUser.balance -= amount;
                let transactions = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
                transactions.unshift({
                    id: Date.now(),
                    type: 'WITHDRAW',
                    amount: amount,
                    status: 'pending',
                    date: new Date().toISOString()
                });
                localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
                updateBalanceDisplay();
                renderTransactions();
                
                // Simulasi proses penarikan
                setTimeout(() => {
                    let updated = JSON.parse(localStorage.getItem(`transactions_${currentUser.id}`) || '[]');
                    const found = updated.find(t => t.id === transactions[0].id);
                    if (found) {
                        found.status = 'success';
                        localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(updated));
                        renderTransactions();
                        alert('✅ Penarikan saldo berhasil! Cek rekening Anda.');
                    }
                }, 3000);
                
                alert('⏳ Permintaan penarikan diproses. Status: PENDING. Uang akan masuk dalam 3 detik.');
            }
        }

        function logout() {
            localStorage.removeItem('devstore_current_user');
            window.location.href = 'index.html';
        }

        loadUser();
    </script>
</body>
  </html>
